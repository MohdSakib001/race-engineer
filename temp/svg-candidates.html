</div><pre id="out">loading...</pre><script>
const svg = document.querySelector('#svg-host svg');
const rows = [...svg.querySelectorAll('path:not([id])')].map((path, index) => {
  const bbox = path.getBBox();
  const style = path.getAttribute('style') || '';
  const fillMatch = style.match(/fill:([^;]+)/);
  const fill = fillMatch ? fillMatch[1].trim() : (path.getAttribute('fill') || '');
  return { index, fill, x:bbox.x, y:bbox.y, w:bbox.width, h:bbox.height, area:bbox.width*bbox.height };
}).filter((row, i) => i !== 0 && row.x >= 120 && row.x <= 340 && row.w >= 12 && row.h >= 12)
  .sort((a,b) => a.y - b.y || a.x - b.x)
  .slice(0, 120);
const text = rows.map(r => `${r.index.toString().padStart(3,' ')} | ${r.fill.padEnd(26,' ')} | x=${r.x.toFixed(1).padStart(6,' ')} y=${r.y.toFixed(1).padStart(6,' ')} w=${r.w.toFixed(1).padStart(6,' ')} h=${r.h.toFixed(1).padStart(6,' ')} area=${r.area.toFixed(0).padStart(7,' ')}`).join('\n');
document.getElementById('out').textContent = text || 'no rows';
</script></body></html>

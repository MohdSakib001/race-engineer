<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 460" width="100%" style="display:block">
  <defs>
    <style>
      .zone { transition: fill 0.35s; stroke: #141414; stroke-width: 1.1; }
      .chassis { fill: #1a1a1d; stroke: #404047; stroke-width: 1.2; }
      .detail { fill: #25252b; stroke: #484851; stroke-width: 0.9; }
      .arm { stroke: #3b3b44; stroke-width: 2; stroke-linecap: round; fill: none; }
    </style>
  </defs>

  <!-- Damage/Wear zones (IDs used by renderer.js) -->
  <path id="zone-fw-l" class="zone" fill="#1a5c2e"
        d="M14,34 C32,18 66,18 104,26 L104,58 C70,64 34,64 14,54 Z"/>
  <path id="zone-fw-r" class="zone" fill="#1a5c2e"
        d="M206,34 C188,18 154,18 116,26 L116,58 C150,64 186,64 206,54 Z"/>

  <rect id="zone-tyre-fl" class="zone" fill="#1a5c2e" x="14" y="70" width="36" height="58" rx="12"/>
  <rect id="zone-tyre-fr" class="zone" fill="#1a5c2e" x="170" y="70" width="36" height="58" rx="12"/>

  <path id="zone-floor" class="zone" fill="#1a5c2e"
        d="M72,132 C84,126 136,126 148,132 L142,306 C134,316 86,316 78,306 Z"/>
  <path id="zone-sp-l" class="zone" fill="#1a5c2e"
        d="M18,138 C32,128 52,126 72,132 L74,302 C52,312 30,310 18,300 Z"/>
  <path id="zone-sp-r" class="zone" fill="#1a5c2e"
        d="M202,138 C188,128 168,126 148,132 L146,302 C168,312 190,310 202,300 Z"/>

  <rect id="zone-tyre-rl" class="zone" fill="#1a5c2e" x="14" y="286" width="36" height="58" rx="12"/>
  <rect id="zone-tyre-rr" class="zone" fill="#1a5c2e" x="170" y="286" width="36" height="58" rx="12"/>

  <path id="zone-diffuser" class="zone" fill="#1a5c2e"
        d="M78,318 C88,326 132,326 142,318 L136,374 C126,384 94,384 84,374 Z"/>
  <path id="zone-rw" class="zone" fill="#1a5c2e"
        d="M36,396 C62,384 158,384 184,396 L184,430 C160,438 60,438 36,430 Z"/>

  <!-- Main chassis -->
  <path class="chassis"
        d="M98,8 L122,8
           C130,20 134,40 136,64
           L136,132 C136,206 136,256 132,318
           C130,348 126,374 122,392
           L98,392 C94,374 90,348 88,318
           C84,256 84,206 84,132
           L84,64 C86,40 90,20 98,8 Z"/>

  <!-- Nose and front structure -->
  <path class="detail" d="M100,8 L120,8 L126,24 L94,24 Z"/>
  <rect class="detail" x="92" y="24" width="36" height="34" rx="5"/>

  <!-- Cockpit and halo -->
  <ellipse class="detail" cx="110" cy="162" rx="15" ry="24" fill="#101014" stroke="#525260" stroke-width="1"/>
  <path fill="none" stroke="#60606a" stroke-width="3.5" stroke-linecap="round"
        d="M93,154 Q110,126 127,154"/>
  <circle cx="110" cy="156" r="9" fill="#2f2f36" stroke="#555562" stroke-width="1.1"/>

  <!-- Side details -->
  <rect class="detail" x="96" y="220" width="28" height="74" rx="8"/>
  <rect class="detail" x="92" y="296" width="36" height="40" rx="6"/>
  <rect class="detail" x="101" y="336" width="18" height="58" rx="3"/>

  <!-- Wing endplates -->
  <path class="detail" d="M10,30 L18,30 L18,62 L10,60 Z"/>
  <path class="detail" d="M210,30 L202,30 L202,62 L210,60 Z"/>
  <path class="detail" d="M32,392 L40,392 L40,434 L32,432 Z"/>
  <path class="detail" d="M188,392 L180,392 L180,434 L188,432 Z"/>

  <!-- Suspension arms -->
  <line class="arm" x1="50" y1="86" x2="84" y2="92"/>
  <line class="arm" x1="170" y1="86" x2="136" y2="92"/>
  <line class="arm" x1="50" y1="108" x2="84" y2="100"/>
  <line class="arm" x1="170" y1="108" x2="136" y2="100"/>

  <line class="arm" x1="50" y1="304" x2="86" y2="300"/>
  <line class="arm" x1="170" y1="304" x2="134" y2="300"/>
  <line class="arm" x1="50" y1="328" x2="88" y2="312"/>
  <line class="arm" x1="170" y1="328" x2="132" y2="312"/>
</svg>

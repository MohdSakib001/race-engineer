<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 460" width="100%" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" style="display:block">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d2d34"/>
      <stop offset="48%" stop-color="#1b1b22"/>
      <stop offset="100%" stop-color="#0f1016"/>
    </linearGradient>
    <linearGradient id="detailGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34343d"/>
      <stop offset="100%" stop-color="#17181f"/>
    </linearGradient>
    <filter id="carShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <style>
      .zone { transition: fill 0.35s; stroke: rgba(244,246,255,0.16); stroke-width: 1.15; stroke-linejoin: round; vector-effect: non-scaling-stroke; }
      .chassis { fill: url(#bodyGrad); stroke: #5a5a66; stroke-width: 1.2; vector-effect: non-scaling-stroke; }
      .detail { fill: url(#detailGrad); stroke: #696977; stroke-width: 0.95; vector-effect: non-scaling-stroke; }
      .arm { stroke: #575765; stroke-width: 2.1; stroke-linecap: round; fill: none; vector-effect: non-scaling-stroke; }
      .panel-line { fill: none; stroke: rgba(255,255,255,0.12); stroke-width: 1; stroke-linecap: round; vector-effect: non-scaling-stroke; }
      .accent { fill: none; stroke: rgba(0,210,190,0.28); stroke-width: 1.35; stroke-linecap: round; vector-effect: non-scaling-stroke; }
    </style>
  </defs>

